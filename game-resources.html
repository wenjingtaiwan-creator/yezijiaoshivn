<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>互動遊戲資源區</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        .game-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .game-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .game-card h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .game-desc {
            margin-top: 10px;
            font-size: 0.9em;
            color: #666;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 嵌入式互動遊戲資源</h1>
        <p>歡迎來到遊戲區，點擊或直接在下方畫面中操作即可開始遊玩！</p>
    </header>

    <main class="game-container">
        
        <!-- 遊戲卡片 1 -->
        <div class="game-card">
            <h3>熱鬧公園 Công viên náo nhiệt</h3>
            <div style="width: 100%;">
                <div style="position: relative; padding-bottom: 56.25%; padding-top: 0; height: 0;">
                    <iframe title="熱鬧公園 Công viên náo nhiệt_葉子教室設計" frameborder="0" width="1200" height="675" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://view.genially.com/6a490a0c31f90496a8ce04b9" type="text/html" allowscriptaccess="always" allowfullscreen="true" scrolling="yes" allownetworking="all"></iframe>
                </div>
            </div>
            <p class="game-desc">這是第一個互動遊戲「熱鬧公園」的簡介說明，可以在這裡寫上遊玩規則或教學目標。</p>
        </div>

        <!-- 遊戲卡片 2 -->
        <div class="game-card">
            <h3>線上蛇棋 Cờ rắn</h3>
            <div style="width: 100%;">
                <div style="position: relative; padding-bottom: 56.25%; padding-top: 0; height: 0;">
                    <iframe title="Interactive online games" frameborder="0" width="1200" height="675" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" src="https://view.genially.com/65abd9752f7cd00014fcdd9a" type="text/html" allowscriptaccess="always" allowfullscreen="true" scrolling="yes" allownetworking="all"></iframe>
                </div>
            </div>
            <p class="game-desc">這是新加入的互動線上遊戲，點擊畫面的按鈕即可開始遊玩與學習！</p>
        </div>

    </main>

</body>
</html>
